<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drifter: Ultra Graphics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        #hud {
            position: absolute; top: 20px; left: 20px;
            background: rgba(10, 10, 25, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 10px; padding: 15px 25px;
            color: #fff; min-width: 220px; pointer-events: none;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }
        .hud-line { font-size: 18px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .hud-line span { color: #00ffff; text-shadow: 0 0 8px #00ffff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hud">
        <div class="hud-line">SCORE: <span id="scoreText">0</span></div>
        <div class="hud-line">SPEED: <span id="speedText">MACH 2</span></div>
    </div>
    <div id="gameCanvas"></div>
    <script src="game.js"></script>
</body>
</html>
